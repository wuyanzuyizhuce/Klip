<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: Premium Macaron Dream -->
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB7D5"/>
      <stop offset="1" stop-color="#FFE9D1"/>
    </linearGradient>

    <!-- 3D Puffy Shadows -->
    <filter id="puffy_depth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#FF5D8F" flood-opacity="0.3"/>
    </filter>
    
    <!-- Inner Glow for Clay effect -->
    <filter id="inner_soft" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="out"/>
    </filter>

    <linearGradient id="puffy_white" x1="256" y1="100" x2="256" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="#FDF2F5"/>
    </linearGradient>
  </defs>

  <!-- Super Rounded Icon Base -->
  <rect width="512" height="512" rx="140" fill="url(#bg_grad)"/>
  
  <!-- Subtle Ambient Light Circle -->
  <circle cx="256" cy="256" r="220" fill="white" fill-opacity="0.1" filter="blur(60px)"/>

  <!-- The "K" Monster (Smoother, Puffer, Rounder) -->
  <g filter="url(#puffy_depth)">
    <!-- Main Body Trunk -->
    <rect x="155" y="105" width="85" height="302" rx="42.5" fill="url(#puffy_white)"/>
    
    <!-- Upper Ear (Smooth connection) -->
    <path d="M220 235C220 235 240 215 310 145C335 120 375 120 400 145V145C425 170 425 210 400 235L280 325C280 325 240 290 220 235Z" fill="url(#puffy_white)"/>
    
    <!-- Lower Ear (Smooth connection) -->
    <path d="M220 277C220 277 240 297 310 367C335 392 375 392 400 367V367C425 342 425 302 400 277L280 187C280 187 240 222 220 277Z" fill="url(#puffy_white)"/>
    
    <!-- Face (Super Cute Detail) -->
    <g>
      <!-- Eyes with reflection -->
      <circle cx="180" cy="235" r="16" fill="#333333"/>
      <circle cx="215" cy="235" r="16" fill="#333333"/>
      <circle cx="184" cy="229" r="6" fill="white"/> <!-- Sparkle 1 -->
      <circle cx="219" cy="229" r="6" fill="white"/> <!-- Sparkle 2 -->
      
      <!-- Tiny Blush -->
      <circle cx="160" cy="265" r="25" fill="#FF77A8" fill-opacity="0.4" filter="blur(8px)"/>
      <circle cx="235" cy="265" r="25" fill="#FF77A8" fill-opacity="0.4" filter="blur(8px)"/>
      
      <!-- Tiny Smile -->
      <path d="M192 258C192 258 197 265 203 258" stroke="#333333" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Sweet Accessory: Candy Paperclip -->
  <g transform="translate(360, 230) rotate(10)" opacity="0.9">
    <rect width="25" height="85" rx="12.5" fill="#4ADE80" fill-opacity="0.4"/>
    <rect x="5" y="5" width="15" height="75" rx="7.5" stroke="white" stroke-width="4" stroke-opacity="0.6"/>
  </g>

  <!-- Top Gloss Highlight -->
  <path d="M170 135C170 120 185 120 200 120H210" stroke="white" stroke-width="15" stroke-linecap="round" stroke-opacity="0.6"/>
</svg>
